services:
  db:
    image: postgres:16-alpine
    container_name: posts-db
    environment:
      POSTGRES_DB: posts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d posts"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: golang:1.21
    container_name: posts-app
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      ADDR: ":8081"
      DSN: "host=db port=5432 user=postgres password=postgres dbname=posts sslmode=disable"
    command: sh -c "go mod tidy && go run ."
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"

  web:
    image: nginx:1.27-alpine
    container_name: posts-web
    depends_on:
      - app
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

volumes:
  pgdata:
